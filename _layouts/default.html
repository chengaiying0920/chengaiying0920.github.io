<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | escape }}">
    {% seo title=false %}
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} 首页">
        {{ site.title }}
      </a>
      <p class="site-description">{{ site.description }}</p>
      <nav class="site-nav" aria-label="主导航">
        <a href="{{ '/' | relative_url }}">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 10.5 12 3l9 7.5v9A1.5 1.5 0 0 1 19.5 21H15v-6H9v6H4.5A1.5 1.5 0 0 1 3 19.5z"/>
          </svg>
          <span>首页</span>
        </a>
        <a href="{{ '/categories/' | relative_url }}">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H10l2 2.5h6.5A1.5 1.5 0 0 1 20 8v10.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5z"/>
          </svg>
          <span>分类</span>
        </a>
        <a href="{{ '/archive/' | relative_url }}">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M6 3.5h9l3 3V20a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 6 20z"/>
            <path d="M14.5 3.5V7H18"/>
            <path d="M9 11h6M9 15h6"/>
          </svg>
          <span>归档</span>
        </a>
        <a href="{{ '/about/' | relative_url }}">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 12.5a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/>
            <path d="M4.5 20.5a7.5 7.5 0 0 1 15 0"/>
          </svg>
          <span>关于</span>
        </a>
      </nav>
    </header>
    <main class="site-main">
      {{ content }}
    </main>
    <footer class="site-footer">
      <span>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</span>
    </footer>
  </body>
</html>
