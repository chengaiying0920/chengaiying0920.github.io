<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | escape }}">
    {% seo title=false %}
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} 首页">
        {{ site.title }}
      </a>
      <p class="site-description">{{ site.description }}</p>
      <nav class="site-nav" aria-label="主导航">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/categories/' | relative_url }}">分类</a>
        <a href="{{ '/archive/' | relative_url }}">归档</a>
        <a href="{{ '/about/' | relative_url }}">关于</a>
      </nav>
    </header>
    <main class="site-main">
      {{ content }}
    </main>
    <footer class="site-footer">
      <span>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</span>
    </footer>
  </body>
</html>
