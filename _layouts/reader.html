---
layout: default
---

<article class="article">
  <header class="article-header">
    <p class="eyebrow">Markdown Reader</p>
    <h1 id="reader-title">{{ page.title }}</h1>
  </header>
  <div class="reader-toolbar">
    <input id="markdown-file" type="text" value="docs/sample.md" aria-label="Markdown file path">
    <button id="load-markdown" type="button">读取</button>
  </div>
  <div id="markdown-content" class="prose"></div>
</article>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
<script src="{{ '/assets/js/reader.js' | relative_url }}" defer></script>
