---
layout: default
---

<article class="article">
  <header class="article-header">
    <p class="eyebrow">{{ page.date | date: "%Y-%m-%d" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.tags.size > 0 %}
      <div class="tags">
        {% for tag in page.tags %}
          <span>{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
  {% unless page.comments == false %}
    {% include giscus.html %}
  {% endunless %}
</article>
