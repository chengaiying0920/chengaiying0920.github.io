title: Cheng Aiying
description: Personal notes on code, products, and life.
url: "https://chengaiying0920.github.io"
baseurl: ""
lang: zh-CN
timezone: Asia/Shanghai

markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

giscus:
  enabled: false
  repo: chengaiying0920/chengaiying0920.github.io
  repo_id: R_kgDOPSm0qA
  category: General
  category_id: ""
  mapping: pathname
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: bottom
  theme: preferred_color_scheme
  lang: zh-CN

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Cheng Aiying
  - scope:
      path: ""
      type: "notes"
    values:
      layout: page
  - scope:
      path: ""
    values:
      layout: page

collections:
  notes:
    output: true
    permalink: /notes/:path/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
